name: AI Service CI Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    permissions:
      contents: read
      packages: write
      id-token: write          # Required for Azure OIDC
      security-events: write   # Required for Trivy SARIF uploads
      pull-requests: write     # Required for SonarCloud PR comments
    uses: OrganiStation-org/shared-workflows/.github/workflows/reusable-ci.yaml@main
    with:
      image_name: ai-service
      sonar_project_key: organistation-ai
      sonar_org: "OrganiStation-org"
    secrets: inherit
